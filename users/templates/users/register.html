{% extends "base.html" %}

{% block content %}
    <h2>Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
    <p class="mt-2">
        Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a>
    </p>
{% endblock %}

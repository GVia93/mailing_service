{% extends 'base.html' %}
{% block title %}Пользователи{% endblock %}

{% block content %}
<h1>Пользователи</h1>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Email</th>
            <th>Активен</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.email }}</td>
            <td>{{ user.is_active|yesno:"Да,Нет" }}</td>
            <td>
                {% if request.user != user %}
                <form method="post" action="{% url 'users:user_toggle_block' user.pk %}">
                    {% csrf_token %}
                    <button class="btn btn-sm btn-danger">
                        {% if user.is_active %}Заблокировать{% else %}Разблокировать{% endif %}
                    </button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

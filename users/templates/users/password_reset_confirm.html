{% extends 'base.html' %}

{% block content %}
    <h2>Сброс пароля</h2>
    {% if validlink %}
        <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Установить новый пароль</button>
        </form>
    {% else %}
        <p>Ссылка для сброса пароля недействительна. Пожалуйста, запросите новую.</p>
    {% endif %}
{% endblock %}

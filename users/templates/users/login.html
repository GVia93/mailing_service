{% extends "base.html" %}

{% block content %}
    <h2>Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Войти</button>
    </form>
    <p class="mt-2">
        Нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрироваться</a>
    </p>
    <p>
        <a href="{% url 'users:password_reset' %}">Забыли пароль?</a>
    </p>
{% endblock %}

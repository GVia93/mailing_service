{% extends 'base.html' %}
{% block title %}Удаление сообщения{% endblock %}

{% block content %}
<h1>Удаление сообщения</h1>
<p>Вы уверены, что хотите удалить <strong>{{ object.subject }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'mailings:message_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Сообщения{% endblock %}

{% block content %}
<h1>Сообщения</h1>
<a href="{% url 'mailings:message_create' %}" class="btn btn-primary mb-3">Добавить сообщение</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Тема</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for message in object_list %}
        <tr>
            <td>{{ message.subject }}</td>
            <td>
                <a href="{% url 'mailings:message_update' message.pk %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'mailings:message_delete' message.pk %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

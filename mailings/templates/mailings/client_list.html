{% extends 'base.html' %}
{% block title %}Клиенты{% endblock %}

{% block content %}
<h1>Клиенты</h1>
<a href="{% url 'mailings:client_create' %}" class="btn btn-primary mb-3">Добавить клиента</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ФИО</th>
            <th>Email</th>
            <th>Комментарий</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for client in object_list %}
        <tr>
            <td>{{ client.full_name }}</td>
            <td>{{ client.email }}</td>
            <td>{{ client.comment }}</td>
            <td>
                <a href="{% url 'mailings:client_update' client.pk %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'mailings:client_delete' client.pk %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Сервис рассылок{% endblock %}</title>
    <link href="{% static 'bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 200px;
            background-color: #1E1E2F;
            padding-top: 20px;
        }
        .sidebar .nav-link {
            color: #f1f1f1;
        }
        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: white;
        }
        .main-content {
            flex-grow: 1;
            padding: 2rem;
        }
        .container {
            max-width: 960px;
        }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column p-3 border-end">
        <h5 class="text-center text-white">Меню</h5>
        <ul class="nav nav-pills flex-column mb-auto">
            <li>
                <a href="{% url 'mailings:client_list' %}" class="nav-link {% if '/clients/' in request.path %}active{% endif %}">Клиенты</a>
            </li>
            <li>
                <a href="{% url 'mailings:message_list' %}" class="nav-link {% if '/messages/' in request.path %}active{% endif %}">Сообщения</a>
            </li>
            <li>
                <a href="{% url 'mailings:mailing_list' %}" class="nav-link {% if '/mailings/' in request.path %}active{% endif %}">Рассылки</a>
            </li>
            <li>
                <a href="{% url 'mailings:attempt_list' %}" class="nav-link {% if '/attempts/' in request.path %}active{% endif %}">Попытки рассылок</a>
            </li>
        </ul>
        <hr>
        <div class="dropdown px-3">
            <span class="text-white">Пользователь</span>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
